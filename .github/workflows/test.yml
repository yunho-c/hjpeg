name: Continuous Integration

on:
  push:
    tags: ['*']
    branches: ['main']
  pull_request:
  workflow_dispatch:

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache Scala
        uses: coursier/cache-action@v6
      - name: Setup Scala
        uses: coursier/setup-action@v1
        with:
          jvm: temurin:21
          apps: sbt
      - name: Setup Dependencies
        run: |
          sudo apt-get install verilator
          verilator --version
      - name: Design Graph Helper Tests
        run: python3 scripts/dev/generate_design_graphs_test.py
      - name: Host Helper Tests
        run: python3 scripts/host/hjpeg_host_test.py
      - name: Vivado Report Helper Tests
        run: python3 scripts/vivado/check_reports_test.py
      - name: ChiselSim Environment Helper Tests
        run: python3 scripts/dev/check_chiselsim_env_test.py
      - name: Python Compile Checks
        run: |
          python3 -m py_compile \
            scripts/host/hjpeg_host.py \
            scripts/vivado/check_reports.py \
            scripts/dev/check_chiselsim_env.py
      - name: SBT Test
        run: sbt test
      - name: mill Test
        run: ./mill _.test
